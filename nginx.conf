server {
    listen 80;
    server_name niswa.online www.niswa.online;

    # Path ke React build folder
    root /var/www/niswa.online/frontend-react/dist;

    index index.html index.htm;

    # Konfigurasi untuk SPA React - redirect semua route ke index.html
    location / {
        # Try files yang sebenarnya dulu, jika tidak ada redirect ke index.html
        try_files $uri $uri/ /index.html;
        
        # Cegah caching untuk index.html agar selalu get update terbaru
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Cache static assets dengan waktu lama
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Disable access ke dotfiles seperti .env
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip compression untuk static files
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_min_length 1000;

    # SSL configuration (uncomment jika sudah punya sertifikat)
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/niswa.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/niswa.online/privkey.pem;
}

